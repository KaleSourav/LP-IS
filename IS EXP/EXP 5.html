<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diffie-Hellman Key Exchange</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px 0;
            box-sizing: border-box;
        }

        button {
            padding: 10px 16px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #eef7ff;
            border-left: 5px solid #007bff;
            white-space: pre-line;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Diffie-Hellman Key Exchange</h2>

        <label>Prime number P:</label>
        <input type="number" id="p" value="23">

        <label>Primitive root G:</label>
        <input type="number" id="g" value="9">

        <label>Alice private key (a):</label>
        <input type="number" id="a" value="4">

        <label>Bob private key (b):</label>
        <input type="number" id="b" value="3">

        <button onclick="computeDH()">Generate Keys</button>

        <div class="result" id="output"></div>
    </div>

    <script>
        function modPow(base, exp, mod) {
            let result = 1;
            base = base % mod;

            while (exp > 0) {
                if (exp % 2 === 1) {
                    result = (result * base) % mod;
                }
                exp = Math.floor(exp / 2);
                base = (base * base) % mod;
            }

            return result;
        }

        function computeDH() {
            let p = parseInt(document.getElementById("p").value);
            let g = parseInt(document.getElementById("g").value);
            let a = parseInt(document.getElementById("a").value);
            let b = parseInt(document.getElementById("b").value);

            let x = modPow(g, a, p);   // Alice public key
            let y = modPow(g, b, p);   // Bob public key

            let ka = modPow(y, a, p);  // Alice shared secret
            let kb = modPow(x, b, p);  // Bob shared secret

            let output = "";
            output += "Public Keys available = P, G\n";
            output += "Alice private key = " + a + "\n";
            output += "Bob private key = " + b + "\n\n";
            output += "Alice public key x = (" + g + "^" + a + " mod " + p + ") = " + x + "\n";
            output += "Bob public key y = (" + g + "^" + b + " mod " + p + ") = " + y + "\n\n";
            output += "Alice received key y = " + y + "\n";
            output += "Bob received key x = " + x + "\n\n";
            output += "Alice shared secret = " + ka + "\n";
            output += "Bob shared secret = " + kb + "\n\n";
            output += "Shared Secret Key = " + ka;

            document.getElementById("output").innerText = output;
        }
    </script>
</body>

</html>
